<li id="category-{{ category.id }}" class="category-item">
    <span class="category-name">📁 {{ category.name }}</span>
    <button
        class="btn btn-sm btn-danger"
        hx-delete="/categories/{{ category.id }}"
        hx-target="#category-{{ category.id }}"
        hx-swap="outerHTML"
        hx-confirm="Delete '{{ category.name }}' and all its tasks?"
    >🗑️</button>
</li>
